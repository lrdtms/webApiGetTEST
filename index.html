<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard API Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 24px; }
    h1 { font-size: 1.4rem; margin-bottom: 20px; }
    h2 { font-size: 1rem; margin-bottom: 12px; color: #444; }

    .config-bar {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .config-bar label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      flex: 1;
      min-width: 200px;
    }
    .config-bar input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 12px;
    }
    .form-row label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .form-row input[type="date"] {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    button {
      padding: 8px 18px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }

    .status {
      font-size: 0.85rem;
      color: #c0392b;
      min-height: 20px;
      margin-bottom: 12px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      text-align: left;
      padding: 8px 12px;
      background: #f0f4f8;
      border-bottom: 2px solid #ddd;
      font-weight: 600;
    }
    td { padding: 8px 12px; border-bottom: 1px solid #eee; }
    tr.expandable { cursor: pointer; }
    tr.expandable:hover td { background: #f9f9f9; }
    tr.detail td { background: #fafbfc; padding: 12px; }

    .detail-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    .tab-btn {
      padding: 4px 14px;
      background: #f0f4f8;
      color: #555;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .tab-btn:hover { background: #e2e8f0; color: #333; }
    .tab-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .tab-btn.active:hover { background: #1d4ed8; }
    .student-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 24px;
      font-size: 0.83rem;
      color: #444;
      padding: 2px 0;
    }

    /* Filter controls */
    .filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    #clockSearch {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .filter-btn {
      padding: 8px 14px;
      background: #fff;
      color: #2563eb;
      border: 1px solid #2563eb;
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .filter-btn:hover { background: #eff6ff; }
    .filter-btn.active { background: #eff6ff; }
    .filter-badge {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 0.75rem;
      margin-left: 4px;
      vertical-align: middle;
    }
    .filter-panel {
      background: #f8fafc;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 12px;
    }
    .filter-panel label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .filter-panel select,
    .filter-panel input[type="text"] {
      padding: 7px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      min-width: 160px;
    }
    .clear-btn {
      padding: 7px 12px;
      background: transparent;
      color: #666;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .clear-btn:hover { background: #f5f5f5; color: #333; }
    .row-count {
      font-size: 0.8rem;
      color: #666;
      margin-top: 8px;
      text-align: right;
    }
    .no-results {
      color: #888;
      font-size: 0.875rem;
      padding: 16px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Dashboard API Tester</h1>

  <div class="config-bar">
    <label>
      Base URL
      <input type="text" id="baseUrl" placeholder="https://myapi.azurewebsites.net">
    </label>
    <label>
      API Key
      <input type="password" id="apiKey" placeholder="DASH...">
    </label>
  </div>

  <div class="card">
    <h2>GET /api/dashboard/summary</h2>
    <div class="form-row">
      <label>Date <input type="date" id="summaryDate"></label>
      <button onclick="fetchSummary()">Get Summary</button>
    </div>
    <div class="status" id="summaryStatus"></div>
    <div id="summaryTable"></div>
  </div>

  <div class="card">
    <h2>GET /api/dashboard/clockevents</h2>
    <div class="form-row">
      <label>From <input type="date" id="clockFrom"></label>
      <label>To <input type="date" id="clockTo"></label>
      <button onclick="fetchClockEvents()">Get Clock Events</button>
    </div>
    <div class="status" id="clockStatus"></div>
    <div id="clockTable"></div>
  </div>

  <script>
    let clockEventsData = [];

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function apiFetch(path) {
      const baseUrl = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!baseUrl || !apiKey) throw new Error('Base URL and API Key are required');
      const res = await fetch(`${baseUrl}${path}`, {
        headers: { 'X-Api-Key': apiKey }
      });
      if (!res.ok) {
        let msg;
        try { const body = await res.json(); msg = body.message; } catch { msg = res.statusText; }
        throw new Error(`HTTP ${res.status}: ${msg || res.statusText}`);
      }
      return res.json();
    }

    async function fetchSummary() {
      const date = document.getElementById('summaryDate').value;
      const status = document.getElementById('summaryStatus');
      const container = document.getElementById('summaryTable');
      status.textContent = '';
      container.innerHTML = '';
      try {
        const data = await apiFetch(`/api/dashboard/summary?date=${date}`);
        if (!data.length) { status.textContent = 'No data returned for this date'; return; }
        renderSummaryTable(data, container);
      } catch (e) {
        status.textContent = e instanceof TypeError
          ? 'Could not reach the API — check the base URL and that your origin is on the CORS allowlist'
          : e.message;
      }
    }

    function renderSummaryTable(data, container) {
      const table = document.createElement('table');
      table.innerHTML = `<thead><tr>
        <th>Cohort</th><th>Total Students</th><th>Clocked In</th><th>Not Clocked In</th>
      </tr></thead><tbody></tbody>`;
      const tbody = table.querySelector('tbody');
      data.forEach(cohort => {
        const row = document.createElement('tr');
        row.className = 'expandable';
        row.innerHTML = `
          <td>${esc(cohort.cohortName)}</td>
          <td>${esc(cohort.totalStudents)}</td>
          <td>${esc(cohort.totalClockedIn)}</td>
          <td>${esc(cohort.totalNotClockedIn)}</td>
        `;
        const detail = document.createElement('tr');
        detail.className = 'detail';
        detail.hidden = true;

        const ciNames = cohort.clockedIn.map(s => `<span>${esc(s.name + ' ' + s.surname)}</span>`).join('') || '<em>None</em>';
        const nciNames = cohort.notClockedIn.map(s => `<span>${esc(s.name + ' ' + s.surname)}</span>`).join('') || '<em>None</em>';

        detail.innerHTML = `<td colspan="4">
          <div class="detail-tabs">
            <button class="tab-btn active" data-tab="in">Clocked In (${cohort.totalClockedIn})</button>
            <button class="tab-btn" data-tab="out">Not Clocked In (${cohort.totalNotClockedIn})</button>
          </div>
          <div class="student-list" data-content="in">${ciNames}</div>
          <div class="student-list" data-content="out" hidden>${nciNames}</div>
        </td>`;

        detail.querySelectorAll('.tab-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            detail.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
            detail.querySelectorAll('.student-list').forEach(el => { el.hidden = el.dataset.content !== tab; });
          });
        });

        row.addEventListener('click', () => { detail.hidden = !detail.hidden; });
        tbody.appendChild(row);
        tbody.appendChild(detail);
      });
      container.appendChild(table);
    }

    async function fetchClockEvents() {
      const from = document.getElementById('clockFrom').value;
      const to = document.getElementById('clockTo').value;
      const status = document.getElementById('clockStatus');
      const container = document.getElementById('clockTable');
      status.textContent = '';
      container.innerHTML = '';
      clockEventsData = [];
      try {
        const data = await apiFetch(`/api/dashboard/clockevents?from=${from}&to=${to}`);
        if (!data.length) { status.textContent = 'No data returned for this date range'; return; }
        clockEventsData = data;
        renderClockControls(container, data);
        applyFilters();
      } catch (e) {
        status.textContent = e instanceof TypeError
          ? 'Could not reach the API — check the base URL and that your origin is on the CORS allowlist'
          : e.message;
      }
    }

    function renderClockControls(container, data) {
      const cohorts = [...new Set(data.map(ev => ev.cohortName))].sort();
      const options = cohorts.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
      container.innerHTML = `
        <div class="filter-row">
          <input type="text" id="clockSearch" placeholder="Search student, cohort, date…" oninput="applyFilters()">
          <button class="filter-btn" id="filterToggle" onclick="toggleFilterPanel()">Filter <span class="filter-badge" id="filterBadge" hidden></span></button>
        </div>
        <div class="filter-panel" id="filterPanel" hidden>
          <label>Cohort
            <select id="filterCohort" onchange="applyFilters()">
              <option value="">All cohorts</option>
              ${options}
            </select>
          </label>
          <label>Student
            <input type="text" id="filterStudent" placeholder="Type name…" oninput="applyFilters()">
          </label>
          <button class="clear-btn" onclick="clearFilters()">Clear filters</button>
        </div>
        <div id="clockTableBody"></div>
        <div class="row-count" id="rowCount"></div>
      `;
    }

    function toggleFilterPanel() {
      const panel = document.getElementById('filterPanel');
      const btn = document.getElementById('filterToggle');
      if (!panel) return;
      panel.hidden = !panel.hidden;
      btn.classList.toggle('active', !panel.hidden);
    }

    function updateFilterBadge() {
      const cohort = document.getElementById('filterCohort')?.value || '';
      const student = (document.getElementById('filterStudent')?.value || '').trim();
      const count = (cohort ? 1 : 0) + (student ? 1 : 0);
      const badge = document.getElementById('filterBadge');
      if (!badge) return;
      if (count > 0) {
        badge.textContent = `·${count}`;
        badge.hidden = false;
      } else {
        badge.hidden = true;
      }
    }

    function clearFilters() {
      const cohort = document.getElementById('filterCohort');
      const student = document.getElementById('filterStudent');
      if (cohort) cohort.value = '';
      if (student) student.value = '';
      applyFilters();
    }

    function applyFilters() {
      if (!clockEventsData.length) return;

      const search = (document.getElementById('clockSearch')?.value || '').trim().toLowerCase();
      const cohort = document.getElementById('filterCohort')?.value || '';
      const student = (document.getElementById('filterStudent')?.value || '').trim().toLowerCase();

      const filtered = clockEventsData.filter(ev => {
        const fullName = `${ev.name} ${ev.surname}`.toLowerCase();
        if (search && !`${fullName} ${ev.cohortName.toLowerCase()} ${ev.sessionDate}`.includes(search)) return false;
        if (cohort && ev.cohortName !== cohort) return false;
        if (student && !fullName.includes(student)) return false;
        return true;
      });

      updateFilterBadge();

      const tableBody = document.getElementById('clockTableBody');
      if (!tableBody) return;
      tableBody.innerHTML = '';

      if (filtered.length === 0) {
        tableBody.innerHTML = '<p class="no-results">No results match the current filters.</p>';
      } else {
        renderClockEventsTable(filtered, tableBody);
      }

      const rowCount = document.getElementById('rowCount');
      if (rowCount) {
        rowCount.textContent = filtered.length < clockEventsData.length
          ? `Showing ${filtered.length} of ${clockEventsData.length} rows`
          : '';
      }
    }

    function renderClockEventsTable(data, container) {
      const table = document.createElement('table');
      table.innerHTML = `<thead><tr>
        <th>Student</th><th>Cohort</th><th>Date</th><th>Clock In</th><th>Clock Out</th>
      </tr></thead><tbody></tbody>`;
      const tbody = table.querySelector('tbody');
      data.forEach(ev => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${esc(ev.name + ' ' + ev.surname)}</td>
          <td>${esc(ev.cohortName)}</td>
          <td>${esc(ev.sessionDate)}</td>
          <td>${ev.clockInTime ? esc(formatTime(ev.clockInTime)) : '—'}</td>
          <td>${ev.clockOutTime ? esc(formatTime(ev.clockOutTime)) : '—'}</td>
        `;
        tbody.appendChild(row);
      });
      container.appendChild(table);
    }

    // The API returns naive timestamps in the server's local time (Europe/Brussels,
    // CET/CEST). We convert them to South Africa time (Africa/Johannesburg, fixed UTC+2)
    // by resolving Brussels' actual UTC offset for that instant, so DST transitions
    // (last Sunday of March/October) are handled automatically instead of a hardcoded +1/+2.
    function getTimeZoneOffsetMinutes(date, timeZone) {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone,
        hour12: false,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      }).formatToParts(date).reduce((acc, p) => { acc[p.type] = p.value; return acc; }, {});
      const asUTC = Date.UTC(
        parts.year, parts.month - 1, parts.day,
        parts.hour === '24' ? 0 : parts.hour, parts.minute, parts.second
      );
      return (asUTC - date.getTime()) / 60000;
    }

    function formatTime(isoString) {
      // If the string already carries zone info (Z or +hh:mm/-hh:mm) it's an
      // unambiguous instant — parse it directly instead of guessing Brussels offset.
      const hasZone = /Z$|[+-]\d{2}:\d{2}$/.test(isoString);
      let instant;
      if (hasZone) {
        instant = new Date(isoString);
      } else {
        const guessUTC = new Date(isoString + 'Z');
        if (isNaN(guessUTC.getTime())) return isoString;
        const offsetMinutes = getTimeZoneOffsetMinutes(guessUTC, 'Europe/Brussels');
        instant = new Date(guessUTC.getTime() - offsetMinutes * 60000);
      }
      if (isNaN(instant.getTime())) return isoString;
      return instant.toLocaleTimeString('en-ZA', {
        hour: '2-digit', minute: '2-digit', timeZone: 'Africa/Johannesburg'
      });
    }
  </script>
</body>
</html>
